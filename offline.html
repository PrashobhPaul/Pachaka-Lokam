<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#1fa34a"/>
<title>Offline — Pachaka Lokam</title>
<style>
  :root { --green:#1fa34a; --bg:#fffdf7; --ink:#222; --muted:#666; }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
       background:var(--bg);color:var(--ink);display:flex;align-items:center;justify-content:center;padding:24px}
  .card{max-width:420px;text-align:center}
  img{width:96px;height:96px;border-radius:24px;margin-bottom:12px}
  h1{margin:0 0 8px;color:var(--green);font-size:24px}
  p{margin:8px 0;color:var(--muted);line-height:1.5}
  button{margin-top:18px;background:var(--green);color:#fff;border:0;padding:12px 22px;border-radius:10px;
         font-size:15px;font-weight:600;cursor:pointer}
  button:active{transform:translateY(1px)}
</style>
</head>
<body>
<div class="card">
  <img src="assets/logo.png" alt="Pachaka Lokam"/>
  <h1>You're offline</h1>
  <p>Pachaka Lokam works offline once it's loaded. Your data is safe on this device.</p>
  <p>If you're seeing this, the app shell hasn't been cached yet — connect briefly and reopen.</p>
  <button onclick="location.reload()">Try again</button>
</div>
</body>
</html>
