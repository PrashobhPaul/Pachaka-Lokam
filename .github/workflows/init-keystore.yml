# =============================================================================
# Pachaka Lokam — One-time keystore initialiser
# =============================================================================
# Run this ONCE, manually, from the Actions tab on the GitHub web UI / mobile.
# It does three things you couldn't do from a phone otherwise:
#
#   1. Generates a fresh signing keystore (android.keystore) with a strong
#      random password — you'll never need to type or remember the password,
#      it lives in repo Secrets after this.
#   2. Computes the SHA-256 fingerprint and auto-commits it into
#      .well-known/assetlinks.json so the installed APK launches without a
#      Chrome address bar.
#   3. Hands you the keystore + password in a 1-day artifact so you can:
#        a) paste them into repo Secrets (so future builds can sign), and
#        b) keep an offline backup (without it, you can't ship updates).
#
# DO NOT RE-RUN THIS WORKFLOW after your first APK has been published. A new
# keystore = a new signature = existing users have to uninstall and lose data.
# The workflow blocks itself if assetlinks.json already has a real fingerprint.
# =============================================================================

name: Init keystore (one-time)

on:
  workflow_dispatch:
    inputs:
      i_understand:
        description: "Type 'YES I UNDERSTAND' to confirm this is the first build of the app"
        required: true
        default: ''

permissions:
  contents: write   # to auto-commit assetlinks.json

jobs:
  init:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Confirmation gate
        run: |
          if [ "${{ inputs.i_understand }}" != "YES I UNDERSTAND" ]; then
            echo "::error::You must type exactly 'YES I UNDERSTAND' in the input field."
            echo "::error::This guards against accidental re-runs that would orphan existing users."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Block re-runs (assetlinks already initialised)
        run: |
          if ! grep -q "REPLACE_WITH_" .well-known/assetlinks.json; then
            echo "::error::.well-known/assetlinks.json no longer contains the placeholder."
            echo "::error::This means a real SHA-256 fingerprint has been set — the app has been initialised."
            echo "::error::Re-running this workflow would generate a new keystore, breaking all existing installs."
            echo "::error::If you really need to start over: edit .well-known/assetlinks.json via the GitHub web UI,"
            echo "::error::replace the SHA fingerprint string with REPLACE_WITH_YOUR_RELEASE_KEYSTORE_SHA256_FINGERPRINT,"
            echo "::error::commit, then re-run this workflow."
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate keystore + random password
        id: keystore
        run: |
          # Strong random password — 24 alphanumeric chars
          PASS=$(LC_ALL=C tr -dc 'A-Za-z0-9' < /dev/urandom | head -c 24)
          # Mask in logs so it never appears in plaintext
          echo "::add-mask::$PASS"

          # Generate the keystore non-interactively. The DN values don't
          # matter to Android — they're only displayed if anyone inspects
          # the cert chain.
          keytool -genkeypair \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$PASS" -keypass "$PASS" \
            -dname "CN=Pachaka Lokam, OU=PWA, O=Pachaka Lokam, L=Hyderabad, ST=Telangana, C=IN"

          # Compute SHA-256 fingerprint (the format Android Asset Links wants)
          FP=$(keytool -list -v -keystore android.keystore -alias android \
                -storepass "$PASS" 2>/dev/null \
                | grep "SHA256:" | head -1 | awk '{print $2}')
          if [ -z "$FP" ]; then
            echo "::error::Failed to compute keystore SHA-256"; exit 1
          fi

          # Base64 the keystore for the secret (single line, no wraps)
          B64=$(base64 -w0 android.keystore)

          # Stage the artifact files
          mkdir -p artifact
          echo -n "$B64" > artifact/01-keystore-base64.txt

          # Use python to write the multi-line secrets file. A bash heredoc
          # would break YAML's block-scalar indentation rules.
          PASS="$PASS" FP="$FP" python3 <<'PY'
          import os
          content = """\
          ==============================================================================
          GitHub repo Secrets to add (Settings -> Secrets and variables -> Actions -> New)
          ==============================================================================

          Secret name:  ANDROID_KEYSTORE_BASE64
          Secret value: (paste the FULL contents of 01-keystore-base64.txt - single line)

          Secret name:  KEYSTORE_PASSWORD
          Secret value: {pwd}

          Secret name:  KEY_PASSWORD
          Secret value: {pwd}

          Secret name:  KEY_ALIAS
          Secret value: android

          ==============================================================================
          SHA-256 fingerprint (already auto-committed to .well-known/assetlinks.json)
          ==============================================================================

          {fp}

          ==============================================================================
          KEEP THIS FILE FOREVER
          ==============================================================================
          The keystore + password are the SIGNING IDENTITY of your app. If you
          lose them and your repo Secrets get cleared, you can never publish an
          update - every existing user would have to uninstall (losing all data)
          and reinstall.

          Save this folder to:
          - a password manager (1Password, Bitwarden, etc.)
          - an encrypted offline backup (USB, encrypted Drive folder)
          - and a second offline copy

          The artifact will auto-delete from GitHub in 1 day for security.
          After that the keystore lives only in your secrets and your offline
          backup.
          """
          # Strip the 10-space indent that's purely there for YAML readability
          import textwrap
          content = textwrap.dedent(content).format(
              pwd=os.environ["PASS"], fp=os.environ["FP"]
          )
          with open("artifact/02-secrets-to-add.txt", "w") as f:
              f.write(content)
          PY

          # Persist for next steps
          echo "fp=$FP" >> $GITHUB_OUTPUT
          echo "FP=$FP" >> $GITHUB_ENV

      - name: Update .well-known/assetlinks.json with SHA-256
        run: |
          python3 <<PY
          import json
          with open('.well-known/assetlinks.json') as f:
              data = json.load(f)
          data[0]['target']['sha256_cert_fingerprints'] = ["$FP"]
          with open('.well-known/assetlinks.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          print("Updated assetlinks.json with fingerprint:", "$FP")
          PY

      - name: Auto-commit assetlinks.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .well-known/assetlinks.json
          if git diff --cached --quiet; then
            echo "No changes to assetlinks.json (already up to date)"
          else
            git commit -m "Init keystore: set assetlinks.json SHA-256 fingerprint"
            git push
          fi

      - name: Upload keystore + secrets artifact (1-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: keystore-and-secrets-DELETE-AFTER-USE
          path: artifact/
          retention-days: 1
          if-no-files-found: error

      - name: Print next steps
        run: |
          echo "::notice::Keystore generated and assetlinks.json auto-committed."
          echo "::notice::DOWNLOAD the 'keystore-and-secrets-DELETE-AFTER-USE' artifact below — it expires in 24 hours."
          echo "::notice::Then add the 4 secrets to repo Settings, and trigger 'Build and Release APK'."
          echo ""
          echo "Once you've saved the artifact and added secrets:"
          echo "  1. Verify https://pachakalokam.prashobhpaul.com/.well-known/assetlinks.json shows the fingerprint"
          echo "     (wait ~10 min after this run for GitHub Pages to redeploy)"
          echo "  2. Go to Releases -> Draft a new release -> tag v1.0.0 -> Publish"
          echo "  3. The Build workflow runs automatically and attaches pachaka-lokam.apk to the release."
